<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A4174"/>
      <stop offset="100%" stop-color="#001D39"/>
    </linearGradient>
    <linearGradient id="capsuleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#BDD8E9"/>
    </linearGradient>
    <linearGradient id="capsuleBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4E8EA2"/>
      <stop offset="100%" stop-color="#0A4174"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#001D39" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Capsule group, rotated diagonally -->
  <g transform="translate(256,246) rotate(-45)" filter="url(#softShadow)">
    <!-- capsule body: two halves -->
    <rect x="-130" y="-58" width="260" height="116" rx="58" fill="url(#capsuleGrad)"/>
    <path d="M 0 -58 L 0 58 L 72 58 A 58 58 0 0 0 72 -58 Z" fill="url(#capsuleBlueGrad)"/>
    <!-- center seam line -->
    <rect x="-3" y="-58" width="6" height="116" fill="#001D39" opacity="0.18"/>
  </g>

  <!-- Verified check badge -->
  <g transform="translate(354,354)">
    <circle r="62" fill="#2E9E5B"/>
    <circle r="62" fill="none" stroke="#001D39" stroke-opacity="0.12" stroke-width="4"/>
    <path d="M -26 0 L -8 20 L 30 -24" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
